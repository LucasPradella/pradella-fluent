run:
  timeout: 5m
  build-tags:
    - integration

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosec
    - ineffassign
    - unused
    - misspell

linters-settings:
  gosec:
    excludes:
      - G404 # math/rand acceptable for non-crypto uses (question shuffling)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
