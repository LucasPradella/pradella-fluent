name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

      - name: Vet
        run: go vet ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Unit + contract tests with coverage
        run: |
          go test ./... -coverprofile=cover.out -coverpkg=./internal/domain/...,./internal/usecase/...
          go tool cover -func=cover.out | tail -1

      - name: Coverage gate (>=80% domain/usecase)
        run: |
          total=$(go tool cover -func=cover.out | tail -1 | awk '{gsub(/%/,"",$3); print $3}')
          awk -v t="$total" 'BEGIN { if (t+0 < 80.0) { printf "coverage %.1f%% below 80%% gate\n", t; exit 1 } else { printf "coverage %.1f%% OK\n", t } }'

      - name: Integration tests (testcontainers)
        run: go test -tags=integration ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Audit (high+)
        run: npm audit --audit-level=high

      - name: Unit / component tests
        run: npm run test

      - name: Build PWA
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fluentdev
          POSTGRES_PASSWORD: fluentdev
          POSTGRES_DB: fluentdev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fluentdev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build PWA
        working-directory: frontend
        run: npm run build

      - name: Playwright suite (per-story journeys + offline + a11y)
        working-directory: frontend
        run: npm run test:e2e
        env:
          DATABASE_URL: postgres://fluentdev:fluentdev@localhost:5433/fluentdev?sslmode=disable
