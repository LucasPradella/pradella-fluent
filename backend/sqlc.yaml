version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapter/postgres/queries"
    schema: "migrations"
    gen:
      go:
        package: "gen"
        out: "internal/adapter/postgres/gen"
        sql_package: "pgx/v5"
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
          - db_type: "citext"
            go_type: "string"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type: "float64"
